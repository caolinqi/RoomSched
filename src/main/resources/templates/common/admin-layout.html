<!DOCTYPE html>
<html lang="zh-CN"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="_csrf" th:content="${_csrf != null ? _csrf.token : ''}"/>
    <meta name="_csrf_header" th:content="${_csrf != null ? _csrf.headerName : ''}"/>
    <title>RoomSched · 管理后台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/layui/css/layui.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <script th:src="@{/js/jquery.min.js}"></script>
    <script th:src="@{/layui/layui.js}"></script>
    <script th:src="@{/js/sweetalert2.min.js}"></script>
    <script th:src="@{/js/common.js}"></script>
    <style>
        /* ===== 管理后台专属布局 ===== */
        :root {
            --bg: #f1f5f9;
            --card: #ffffff;
            --primary: #0f172a;
            --accent: #6366f1;
            --accent-light: #eef2ff;
            --text-1: #0f172a;
            --text-2: #334155;
            --text-3: #64748b;
            --border: #e2e8f0;
            --border-light: #f1f5f9;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow: 0 4px 24px rgba(0,0,0,0.04);
            --shadow-md: 0 8px 32px rgba(0,0,0,0.08);
            --font-mono: 'JetBrains Mono', ui-monospace, 'Cascadia Code', monospace;
            --nav-h: 60px;
            --sidebar-w: 220px;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text-1);
            min-height: 100vh;
        }

        /* ===== 顶部导航栏 ===== */
        .admin-navbar {
            position: sticky;
            top: 0;
            z-index: 100;
            height: var(--nav-h);
            background: var(--card);
            border-bottom: 1px solid var(--border);
            box-shadow: 0 1px 0 var(--border-light), 0 2px 8px rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
        }

        .admin-navbar-inner {
            max-width: 100%;
            width: 100%;
            margin: 0 auto;
            padding: 0 24px;
            display: flex;
            align-items: center;
            gap: 0;
            height: 100%;
        }

        .admin-navbar-brand {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 17px;
            font-weight: 800;
            color: var(--text-1);
            text-decoration: none;
            letter-spacing: -0.4px;
            margin-right: 40px;
            flex-shrink: 0;
        }

        .admin-navbar-brand .brand-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, #6366f1, #8b5cf6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .admin-navbar-brand .brand-icon svg {
            width: 16px;
            height: 16px;
            stroke: #fff;
            fill: none;
            stroke-width: 2.5;
        }

        .admin-navbar-menu {
            display: flex;
            align-items: stretch;
            height: 100%;
            flex: 1;
            gap: 0;
        }

        .admin-navbar-menu a {
            display: flex;
            align-items: center;
            padding: 0 14px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-3);
            text-decoration: none;
            position: relative;
            transition: color 0.15s;
            white-space: nowrap;
        }

        .admin-navbar-menu a::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 14px;
            right: 14px;
            height: 2px;
            background: var(--accent);
            border-radius: 2px 2px 0 0;
            transform: scaleX(0);
            transition: transform 0.2s ease;
        }

        .admin-navbar-menu a:hover { color: var(--text-1); }
        .admin-navbar-menu a:hover::after { transform: scaleX(0.5); }
        .admin-navbar-menu a.active { color: var(--text-1); font-weight: 700; }
        .admin-navbar-menu a.active::after { transform: scaleX(1); }

        .admin-navbar-right {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
        }

        .admin-navbar-user {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 0 4px;
        }

        .admin-navbar-username {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-2);
        }

        .admin-navbar-logout {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 5px 12px;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-3);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            text-decoration: none;
            transition: all 0.15s;
            background: transparent;
        }

        .admin-navbar-logout:hover {
            color: #dc2626;
            border-color: #fecaca;
            background: #fef2f2;
        }

        /* ===== 主体布局（侧边栏 + 内容区） ===== */
        .admin-body {
            display: flex;
            min-height: calc(100vh - var(--nav-h));
        }

        /* 左侧边栏 */
        .admin-sidebar {
            width: var(--sidebar-w);
            flex-shrink: 0;
            background: var(--card);
            border-right: 1px solid var(--border);
            padding: 16px 0;
            position: sticky;
            top: var(--nav-h);
            height: calc(100vh - var(--nav-h));
            overflow-y: auto;
        }

        .admin-sidebar-menu {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .admin-sidebar-menu li a {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 20px;
            font-size: 14px;
            font-weight: 500;
            color: var(--text-2);
            text-decoration: none;
            transition: all 0.15s;
            border-left: 3px solid transparent;
        }

        .admin-sidebar-menu li a:hover {
            background: var(--accent-light);
            color: var(--accent);
        }

        .admin-sidebar-menu li a.active {
            background: var(--accent-light);
            color: var(--accent);
            border-left-color: var(--accent);
            font-weight: 600;
        }

        .admin-sidebar-menu li a .menu-icon {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            flex-shrink: 0;
        }

        /* 右侧内容区 */
        .admin-content {
            flex: 1;
            min-width: 0;
            padding: 24px;
        }

        /* ===== 通用组件 ===== */
        .rs-card {
            background: var(--card);
            border-radius: var(--radius);
            padding: 24px;
            box-shadow: var(--shadow);
        }

        .rs-page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .rs-page-title {
            font-size: 22px;
            font-weight: 800;
            color: var(--text-1);
            letter-spacing: -0.3px;
        }

        .tag {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            white-space: nowrap;
        }

        .tag::before {
            content: '';
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: currentColor;
            flex-shrink: 0;
        }

        .tag-green  { background: #dcfce7; color: #166534; }
        .tag-red    { background: #fef2f2; color: #dc2626; }
        .tag-yellow { background: #fef9c3; color: #92400e; }
        .tag-blue   { background: #eff6ff; color: #1d4ed8; }
        .tag-gray   { background: #f1f5f9; color: #475569; }
        .tag-purple { background: #f5f3ff; color: #6d28d9; }

        .modern-table { width: 100%; border-collapse: collapse; }
        .modern-table th {
            text-align: left;
            padding: 12px 16px;
            font-size: 12px;
            font-weight: 600;
            color: var(--text-3);
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .modern-table td {
            padding: 14px 16px;
            font-size: 14px;
            color: var(--text-2);
            border-bottom: 1px solid var(--border-light);
            transition: background 0.15s;
        }
        .modern-table tbody tr:last-child td { border-bottom: none; }
        .modern-table tbody tr:hover td { background: var(--bg); }

        .pagination-wrap { margin-top: 20px; }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-3);
        }
        .empty-state svg {
            width: 48px;
            height: 48px;
            stroke: var(--border);
            fill: none;
            stroke-width: 1.5;
            margin-bottom: 12px;
        }
        .empty-state p { font-size: 14px; }

        .alert {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            padding: 12px 16px;
            border-radius: var(--radius-sm);
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
        }
        .alert-success { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
        .alert-error   { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
        .alert svg { width: 16px; height: 16px; stroke: currentColor; fill: none; stroke-width: 2; flex-shrink: 0; margin-top: 1px; }

        /* 深色模式变量 */
        html[data-theme="dark"] {
            --bg: #0a0f1e;
            --card: #111827;
            --primary: #f1f5f9;
            --text-1: #f1f5f9;
            --text-2: #cbd5e1;
            --text-3: #94a3b8;
            --border: #1e293b;
            --border-light: #1e293b;
            --shadow: 0 4px 24px rgba(0, 0, 0, 0.3);
            --shadow-md: 0 8px 32px rgba(0, 0, 0, 0.4);
            --accent-light: #1e1b4b;
        }

        /* 隐藏和显示图标的样式 */
        .icon-sun { display: none; }
        .icon-moon { display: block; }
        html[data-theme="dark"] .icon-sun { display: block; }
        html[data-theme="dark"] .icon-moon { display: none; }
        
        .rs-theme-btn {
            width: 34px;
            height: 34px;
            border-radius: var(--radius-sm);
            border: 1px solid var(--border);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-3);
            transition: all 0.15s;
            flex-shrink: 0;
            margin-right: 15px;
        }
        .rs-theme-btn:hover {
            background: var(--bg);
            color: var(--text-1);
            border-color: var(--text-3);
        }
        .rs-theme-btn svg {
            width: 15px;
            height: 15px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
    </style>
    <!-- 深色模式：读取 localStorage，页面渲染前同步应用，防止闪烁 -->
    <script>
        (function () {
            var theme = localStorage.getItem('rs-theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <!-- 顶部导航栏 -->
    <nav class="admin-navbar">
        <div class="admin-navbar-inner">
            <a th:href="@{/}" class="admin-navbar-brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                        <polyline points="9 22 9 12 15 12 15 22"/>
                    </svg>
                </div>
                RoomSched
            </a>

            <div class="admin-navbar-menu">
                <a th:href="@{/}">首页</a>
                <a th:href="@{/rooms}">会议室</a>
                <a th:href="@{/my-booking}">我的预约</a>
                <a sec:authorize="isAuthenticated()" th:href="@{/profile}">个人中心</a>
                <a th:href="@{/admin/dashboard}" class="active">管理后台</a>
                <a th:href="@{/screen}" target="_blank">状态大屏</a>
            </div>

            <div class="admin-navbar-right">
                <!-- 深色模式切换 -->
                <button class="rs-theme-btn" id="theme-toggle" title="切换深色模式">
                    <!-- 月亮（亮色模式下显示）-->
                    <svg class="icon-moon" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
                    </svg>
                    <!-- 太阳（暗色模式下显示）-->
                    <svg class="icon-sun" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5" />
                        <line x1="12" y1="1" x2="12" y2="3" />
                        <line x1="12" y1="21" x2="12" y2="23" />
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64" />
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78" />
                        <line x1="1" y1="12" x2="3" y2="12" />
                        <line x1="21" y1="12" x2="23" y2="12" />
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36" />
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
                    </svg>
                </button>

                <span class="admin-navbar-user">
                    <svg style="width:14px;height:14px;stroke:var(--text-3);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;" viewBox="0 0 24 24">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                        <circle cx="12" cy="7" r="4"/>
                    </svg>
                    <span class="admin-navbar-username" sec:authentication="name">管理员</span>
                    <a th:href="@{/logout}" class="admin-navbar-logout">退出</a>
                </span>
            </div>
        </div>
    </nav>

    <!-- 主体：侧边栏 + 内容区 -->
    <div class="admin-body">
        <!-- 左侧边栏 -->
        <aside class="admin-sidebar">
            <ul class="admin-sidebar-menu">
                <li>
                    <a th:href="@{/admin/dashboard}" id="sidebar-dashboard">
                        <svg class="menu-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                        仪表盘
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/rooms}" id="sidebar-rooms">
                        <svg class="menu-icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="9" y1="21" x2="9" y2="9"/></svg>
                        会议室管理
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/approvals}" id="sidebar-approvals">
                        <svg class="menu-icon" viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        审批中心
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/bookings}" id="sidebar-bookings">
                        <svg class="menu-icon" viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                        全部预约
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/users}" id="sidebar-users">
                        <svg class="menu-icon" viewBox="0 0 24 24"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        用户管理
                    </a>
                </li>
                <li>
                    <a th:href="@{/admin/audit/page}" id="sidebar-audit">
                        <svg class="menu-icon" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                        操作日志
                    </a>
                </li>
            </ul>
        </aside>

        <!-- 右侧内容区（由 LayoutInterceptor 注入 ${content}） -->
        <main class="admin-content">
            <div th:replace="${content}">页面内容加载中...</div>
        </main>
    </div>

    <!-- Scripts -->
    <script>
        // ===== 深色模式切换 =====
        var toggleBtn = document.getElementById('theme-toggle');
        if (toggleBtn) {
            toggleBtn.addEventListener('click', function () {
                var current = document.documentElement.getAttribute('data-theme');
                var next = current === 'dark' ? 'light' : 'dark';
                document.documentElement.setAttribute('data-theme', next);
                localStorage.setItem('rs-theme', next);
            });
        }

        // ===== 侧边栏高亮（根据当前路径自动激活） =====
        (function() {
            var path = window.location.pathname;
            var sidebarLinks = document.querySelectorAll('.admin-sidebar-menu a');
            sidebarLinks.forEach(function(link) {
                var href = link.getAttribute('href') || '';
                if (path === href || (href !== '/admin/dashboard' && path.startsWith(href))) {
                    link.classList.add('active');
                } else if (path === '/admin/dashboard' && href === '/admin/dashboard') {
                    link.classList.add('active');
                }
            });
        })();

        // ===== 顶部导航高亮 =====
        (function() {
            var navLinks = document.querySelectorAll('.admin-navbar-menu a');
            navLinks.forEach(function(link) {
                var href = link.getAttribute('href') || '';
                if (href === '/admin/dashboard') {
                    link.classList.add('active');
                }
            });
        })();

        // ===== CSRF 全局配置（用于 AJAX） =====
        var csrfToken = $('meta[name="_csrf"]').attr('content');
        var csrfHeader = $('meta[name="_csrf_header"]').attr('content');
        if (csrfToken && csrfHeader) {
            $.ajaxSetup({
                beforeSend: function(xhr) {
                    xhr.setRequestHeader(csrfHeader, csrfToken);
                }
            });
        }
    </script>
</body>
</html>
