<style>
    /* ==================== 极简莫兰迪 Design System ==================== */
    .my-booking-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .my-booking-title { font-size: 24px; font-weight: 800; color: #0f172a; letter-spacing: -0.02em; }
    
    .table-wrap { 
        background: #ffffff; 
        border-radius: 12px; 
        box-shadow: 0 4px 24px rgba(0,0,0,0.04); 
        overflow: hidden; 
    }
    
    /* 现代化表格 */
    .modern-table { width: 100%; border-collapse: collapse; text-align: left; }
    .modern-table th, .modern-table td { padding: 16px 24px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    .modern-table th { background: #f8fafc; color: #64748b; font-weight: 600; font-size: 13px; }
    .modern-table tbody tr { transition: background 0.2s; }
    .modern-table tbody tr:hover { background: #f8fafc; }
    .modern-table tbody tr:last-child td { border-bottom: none; }
    
    .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace; font-weight: 500; color: #0f172a; }
    
    /* Morandi Tags */
    .tag { font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 6px; display: inline-flex; align-items: center; }
    .tag-green { background: #dcfce7; color: #166534; }
    .tag-red { background: #fef2f2; color: #dc2626; }
    .tag-yellow { background: #fef9c3; color: #854d0e; }
    .tag-blue { background: #e0e7ff; color: #3730a3; }
    .tag-gray { background: #f1f5f9; color: #475569; }

    .status-actions { display: flex; gap: 8px; flex-wrap: wrap; }
    
    /* 幽灵操作按钮 */
    .action-link {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 500;
        border-radius: 6px;
        border: none;
        cursor: pointer;
        background: transparent;
        color: #64748b;
        transition: all 0.2s;
        font-family: inherit;
    }
    .action-link:hover { background: #f1f5f9; color: #0f172a; }
    
    .empty-booking { padding: 80px 20px; text-align: center; color: #64748b; }
    .empty-booking i { font-size: 48px; color: #cbd5e1; margin-bottom: 16px; }

    /* ==================== 我的预约专属暗黑模式覆盖 ==================== */
    html[data-theme="dark"] .my-booking-title { color: var(--text-1); }
    html[data-theme="dark"] .table-wrap { background: var(--card); }
    
    /* 强行穿透现代表格 */
    html[data-theme="dark"] .modern-table th { background: var(--bg); color: var(--text-3); border-bottom-color: var(--border); }
    html[data-theme="dark"] .modern-table td { border-bottom-color: var(--border); color: var(--text-1); }
    html[data-theme="dark"] .modern-table tbody tr:hover { background: var(--bg); }
    
    html[data-theme="dark"] .mono { color: var(--text-1); }
    
    /* 空状态处理 */
    html[data-theme="dark"] .empty-booking p[style*="color:#0f172a"] { color: var(--text-1) !important; }
    html[data-theme="dark"] .empty-booking p { color: var(--text-3); }
    
    /* 同步修复莫兰迪标签 */
    html[data-theme="dark"] .tag-green { background: rgba(22, 101, 52, 0.3); color: #4ade80; }
    html[data-theme="dark"] .tag-red { background: rgba(220, 38, 38, 0.3); color: #f87171; }
    html[data-theme="dark"] .tag-yellow { background: rgba(133, 77, 14, 0.3); color: #facc15; }
    html[data-theme="dark"] .tag-blue { background: rgba(55, 48, 163, 0.3); color: #818cf8; }
    html[data-theme="dark"] .tag-gray { background: rgba(71, 85, 105, 0.3); color: #94a3b8; }
    
    /* 幽灵操作按钮悬停适配 */
    html[data-theme="dark"] .action-link { color: var(--text-3); }
    html[data-theme="dark"] .action-link:hover { background: var(--bg); color: var(--text-1); }
</style>

<!-- 页头 -->
<div class="my-booking-header">
    <div class="my-booking-title">我的预约</div>
    <a th:href="@{/rooms}" class="primary-btn">
        <i class="layui-icon layui-icon-add-1"></i> 新建预约
    </a>
</div>

<!-- 预约表格 -->
<div class="table-wrap">
    <table class="modern-table" th:if="${not #lists.isEmpty(page.records)}">
        <thead>
            <tr>
                <th>编号</th>
                <th>会议室</th>
                <th>会议主题</th>
                <th>开始时间</th>
                <th>结束时间</th>
                <th>参会人数</th>
                <th>状态</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="b : ${page.records}">
                <td class="mono" th:text="${b.id}">1</td>
                <td th:text="${b.roomName}">会议室</td>
                <td th:text="${b.meetingTitle}">主题</td>
                <td class="mono" th:text="${b.startTimeFormatted}">时间</td>
                <td class="mono" th:text="${b.endTimeFormatted}">时间</td>
                <td class="mono" th:text="${b.attendeeCount} + ' 人'">0 人</td>
                <td>
                    <span class="tag tag-yellow"  th:if="${b.status == 'PENDING'}">待审批</span>
                    <span class="tag tag-blue"    th:if="${b.status == 'APPROVED'}">已通过</span>
                    <span class="tag tag-green"   th:if="${b.status == 'CHECKED_IN'}">已签到</span>
                    <span class="tag tag-red"     th:if="${b.status == 'REJECTED'}">已拒绝</span>
                    <span class="tag tag-gray"    th:if="${b.status == 'CANCELLED'}">已取消</span>
                    <span class="tag tag-gray"    th:if="${b.status == 'COMPLETED'}">已完成</span>
                    <span class="tag tag-yellow"  th:if="${b.status == 'AUTO_RELEASED'}">超时释放</span>
                </td>
                <td>
                    <div class="status-actions">
                        <button class="action-link"
                                th:if="${b.status == 'PENDING' or b.status == 'APPROVED'}"
                                th:data-id="${b.id}"
                                onclick="cancelBooking(this.getAttribute('data-id'))">
                            取消
                        </button>
                        <button class="action-link"
                                th:if="${b.status == 'APPROVED'}"
                                th:data-id="${b.id}"
                                onclick="checkIn(this.getAttribute('data-id'))">
                            签到
                        </button>
                    </div>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- 空状态 -->
    <div class="empty-booking" th:if="${#lists.isEmpty(page.records)}">
        <i class="layui-icon layui-icon-list"></i>
        <p style="font-size:15px; font-weight:600; margin-bottom:8px; color:#0f172a;">暂无预约记录</p>
        <p style="margin-bottom: 24px;">您还没有发起过任何会议室预约</p>
        <a th:href="@{/rooms}" class="primary-btn">去预约会议室</a>
    </div>
</div>

<!-- 分页 -->
<div class="pagination-wrap" th:if="${page.pages > 1}" style="margin-top: 24px;">
    <div id="my-booking-pagination"></div>
</div>

<script th:inline="javascript">
    var currentPage = /*[[${page.current}]]*/ 1;
    var totalPages  = /*[[${page.pages}]]*/ 1;
    var totalRecords = /*[[${page.total}]]*/ 0;

    layui.use(['laypage'], function() {
        var laypage = layui.laypage;

        if (totalPages > 1) {
            laypage.render({
                elem: 'my-booking-pagination',
                count: totalRecords,
                limit: 10,
                curr: currentPage,
                theme: '#0f172a',
                jump: function(obj, first) {
                    if (!first) {
                        window.location.href = '/my-booking?page=' + obj.curr;
                    }
                }
            });
        }

        // 取消预约
        window.cancelBooking = function(id) {
            SystemAlert.confirm('确定要取消此预约吗？', function() {
                $.ajax({
                    url: '/api/booking/' + id + '/cancel',
                    type: 'PUT',
                    success: function(res) {
                        if (res.code === 200) {
                            SystemAlert.success('已取消', function() { location.reload(); });
                        } else {
                            SystemAlert.error(res.message || '操作失败');
                        }
                    },
                    error: function() { SystemAlert.error('网络错误，请重试'); }
                });
            });
        };

        // 签到
        window.checkIn = function(id) {
            SystemAlert.confirm('确认签到？', function() {
                $.ajax({
                    url: '/api/booking/' + id + '/checkin',
                    type: 'PUT',
                    success: function(res) {
                        if (res.code === 200) {
                            SystemAlert.success('签到成功！', function() { location.reload(); });
                        } else {
                            SystemAlert.error(res.message || '签到失败');
                        }
                    },
                    error: function() { SystemAlert.error('网络错误，请重试'); }
                });
            });
        };
    });
</script>
