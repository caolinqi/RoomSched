<style>
    /* ==================== 极简莫兰迪 Design System ==================== */
    :root {
        --bg: #f1f5f9;
        --card: #ffffff;
        --accent: #0f172a;
        --text-primary: #1e293b;
        --text-secondary: #64748b;
        --radius: 12px;
        --shadow: 0 4px 24px rgba(0,0,0,0.04);
        --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
    }

    /* 页面元素动画过渡 */
    .stat-card, .rs-card, .booking-item, .ghost-btn {
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ==================== 顶部 Hero 区域 ==================== */
    .header-banner {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 32px;
        padding-bottom: 16px;
    }
    .header-left h1 {
        font-size: 28px;
        font-weight: 800;
        color: var(--accent);
        margin-bottom: 8px;
        letter-spacing: -0.02em;
    }
    .header-left p {
        font-size: 14px;
        color: var(--text-secondary);
    }
    .header-actions {
        display: flex;
        gap: 12px;
    }

    /* 幽灵按钮 (Ghost links) */
    .ghost-btn {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: 8px;
        background: transparent;
        color: var(--text-secondary);
        font-size: 14px;
        font-weight: 500;
        text-decoration: none;
        cursor: pointer;
        border: none;
    }
    .ghost-btn:hover {
        background: var(--bg);
        color: var(--accent);
    }
    .ghost-btn.primary-ghost {
        color: var(--accent);
        font-weight: 600;
    }
    .ghost-btn i {
        font-size: 14px;
    }

    /* ==================== 统计卡片 (纯白微投影化) ==================== */
    .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        gap: 24px;
        margin-bottom: 32px;
    }
    .stat-card {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 24px;
        display: flex;
        align-items: center;
        gap: 20px;
    }
    .stat-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 32px rgba(0,0,0,0.08);
    }
    .stat-icon {
        width: 56px;
        height: 56px;
        border-radius: 14px;
        background: var(--bg);
        color: var(--accent);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
    }
    .stat-info {
        display: flex;
        flex-direction: column;
    }
    .stat-num {
        font-size: 36px;
        font-weight: 700;
        color: var(--accent);
        font-family: var(--font-mono);
        line-height: 1;
        margin-bottom: 4px;
    }
    .stat-label {
        font-size: 13px;
        color: var(--text-secondary);
        font-weight: 500;
    }

    /* ==================== 今日会议模块 ==================== */
    .rs-card {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 24px 32px;
    }
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
    }
    .section-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--text-primary);
    }
    .section-actions {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    /* 列表项 */
    .booking-list {
        display: flex;
        flex-direction: column;
    }
    .booking-item {
        display: flex;
        align-items: center;
        padding: 20px 0;
        border-bottom: 1px solid var(--bg);
        gap: 24px;
    }
    .booking-item:last-child {
        border-bottom: none;
        padding-bottom: 0;
    }
    .booking-time {
        font-family: var(--font-mono);
        font-size: 15px;
        color: var(--accent);
        font-weight: 600;
        min-width: 120px;
    }
    .booking-info {
        flex: 1;
        min-width: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
    }
    .booking-title {
        font-size: 15px;
        font-weight: 600;
        color: var(--text-primary);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    .booking-room {
        font-size: 13px;
        color: var(--text-secondary);
        display: flex;
        align-items: center;
        gap: 6px;
    }

    /* ==================== Morandi Tags (莫兰迪状态标签) ==================== */
    .tag {
        font-size: 12px;
        font-weight: 600;
        padding: 6px 12px;
        border-radius: 6px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
    }
    /* 正常/可用/空闲 */
    .tag-green { background: #dcfce7; color: #166534; }
    /* 禁用/占用/拒绝 */
    .tag-red { background: #fef2f2; color: #dc2626; }
    /* 待审批/警告 */
    .tag-yellow { background: #fef9c3; color: #854d0e; }
    /* 其他默认/失效 */
    .tag-gray { background: #f1f5f9; color: #475569; }

    /* ==================== 沉浸式空状态 ==================== */
    .empty-today {
        padding: 80px 0;
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
    }
    .empty-today i {
        font-size: 40px;
        color: #cbd5e1;
        margin-bottom: 16px;
    }
    .empty-today p {
        font-size: 14px;
        color: var(--text-secondary);
    }

    /* ==================== 首页专属暗黑模式覆盖 ==================== */
    html[data-theme="dark"] {
        --accent: #f1f5f9;
        --text-primary: #f1f5f9;
        --text-secondary: #94a3b8;
    }
    
    html[data-theme="dark"] .stat-icon { background: rgba(255, 255, 255, 0.05); }
    
    html[data-theme="dark"] .tag-green { background: rgba(22, 101, 52, 0.3); color: #4ade80; }
    html[data-theme="dark"] .tag-red { background: rgba(220, 38, 38, 0.3); color: #f87171; }
    html[data-theme="dark"] .tag-yellow { background: rgba(133, 77, 14, 0.3); color: #facc15; }
    html[data-theme="dark"] .tag-gray { background: rgba(71, 85, 105, 0.3); color: #94a3b8; }

    /* ==================== AI Input Styles ==================== */
    .ai-booking-card {
        background: var(--card);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 24px;
        margin-bottom: 32px;
        display: flex;
        gap: 16px;
        align-items: center;
        border: 1px solid #e2e8f0;
    }
    html[data-theme="dark"] .ai-booking-card {
        border-color: #334155;
    }
    .ai-booking-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: linear-gradient(135deg, #3b82f6 0%, #8b5cf6 100%);
        color: white;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
        flex-shrink: 0;
    }
    .ai-booking-input-wrapper {
        flex: 1;
        position: relative;
    }
    .ai-booking-input {
        width: 100%;
        height: 48px;
        border: none;
        background: var(--bg);
        border-radius: 8px;
        padding: 0 20px;
        font-size: 15px;
        color: var(--text-primary);
        outline: none;
        transition: all 0.2s;
    }
    .ai-booking-input:focus {
        box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.3);
    }
    .ai-booking-btn {
        height: 48px;
        padding: 0 24px;
        border-radius: 8px;
        background: var(--accent);
        color: var(--card);
        border: none;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.1s;
    }
    .ai-booking-btn:active {
        transform: scale(0.96);
    }
</style>

<!-- Hero 区域 -->
<div class="header-banner">
    <div class="header-left">
        <h1>欢迎回来，开启高效协同</h1>
        <p>实时状态同步，全自动化释放资源，彻底告别撞会烦恼</p>
    </div>
    <div class="header-actions">
        <!-- 高频操作降级为幽灵按钮 -->
        <a th:href="@{/rooms}" class="ghost-btn primary-ghost">
            <i class="layui-icon layui-icon-app"></i>
            浏览会议室
        </a>
        <a th:href="@{/my-booking}" class="ghost-btn">
            <i class="layui-icon layui-icon-list"></i>
            我的预约
        </a>
    </div>
</div>

<!-- AI 智能预定 -->
<div class="ai-booking-card">
    <div class="ai-booking-icon">
        <i class="layui-icon layui-icon-release"></i>
    </div>
    <div class="ai-booking-input-wrapper">
        <input type="text" id="aiInput" class="ai-booking-input" placeholder="输入您的需求，让 AI 帮您预定... (例如：明天下午两点定个10人的会议室)">
    </div>
    <button type="button" class="ai-booking-btn" id="aiBtn">一句话预定</button>
</div>

<!-- 纯白微投影化统计卡片 -->
<div class="stat-grid">
    <div class="stat-card">
        <div class="stat-icon">
            <i class="layui-icon layui-icon-home"></i>
        </div>
        <div class="stat-info">
            <div class="stat-num" th:text="${availableRoomCount}">0</div>
            <div class="stat-label">可用会议室</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon">
            <i class="layui-icon layui-icon-list"></i>
        </div>
        <div class="stat-info">
            <div class="stat-num" th:text="${#lists.size(todayBookings)}">0</div>
            <div class="stat-label">今日我的预约</div>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-icon">
            <i class="layui-icon layui-icon-time"></i>
        </div>
        <div class="stat-info">
            <!-- 实时时间，等宽字体 -->
            <div class="stat-num" id="live-clock">--:--</div>
            <div class="stat-label">当前时间</div>
        </div>
    </div>
</div>

<!-- 今日预约区 -->
<div class="rs-card">
    <div class="section-header">
        <div class="section-title">今日会议</div>
        <div class="section-actions">
            <!-- 纯文本幽灵按钮 -->
            <a th:href="@{/rooms}" class="ghost-btn primary-ghost">
                <i class="layui-icon layui-icon-add-1"></i> 发起预约
            </a>
            <a th:href="@{/my-booking}" class="ghost-btn">
                查看全部 <i class="layui-icon layui-icon-right"></i>
            </a>
        </div>
    </div>

    <!-- 列表 -->
    <div class="booking-list" th:if="${not #lists.isEmpty(todayBookings)}">
        <div class="booking-item" th:each="b : ${todayBookings}">
            <div class="booking-time">
                <span th:text="${#temporals.format(b.startTime, 'HH:mm')}">09:00</span>
                <span>-</span>
                <span th:text="${#temporals.format(b.endTime, 'HH:mm')}">10:00</span>
            </div>
            <div class="booking-info">
                <div class="booking-title" th:text="${b.meetingTitle}">会议主题</div>
                <div class="booking-room">
                    <i class="layui-icon layui-icon-location"></i>
                    <span th:text="${b.roomName}">会议室名称</span>
                </div>
            </div>
            
            <!-- Morandi Tags 莫兰迪状态标签 -->
            <span class="tag tag-yellow" th:if="${b.status == 'PENDING'}">待审批</span>
            <span class="tag tag-green" th:if="${b.status == 'APPROVED'}">已通过</span>
            <span class="tag tag-green" th:if="${b.status == 'CHECKED_IN'}">已签到</span>
            <span class="tag tag-red" th:if="${b.status == 'REJECTED'}">已拒绝</span>
            <span class="tag tag-gray" th:if="${b.status == 'CANCELLED'}">已取消</span>
            <span class="tag tag-gray" th:if="${b.status == 'COMPLETED'}">已完成</span>
            <span class="tag tag-gray" th:if="${b.status == 'AUTO_RELEASED'}">已释放</span>
        </div>
    </div>

    <!-- 沉浸式空状态 -->
    <div class="empty-today" th:if="${#lists.isEmpty(todayBookings)}">
        <i class="layui-icon layui-icon-date"></i>
        <p>今日静谧 · 暂无日程安排</p>
    </div>
</div>

<script>
    // 实时时钟
    function updateClock() {
        var now = new Date();
        var h = String(now.getHours()).padStart(2, '0');
        var m = String(now.getMinutes()).padStart(2, '0');
        var el = document.getElementById('live-clock');
        if (el) el.textContent = h + ':' + m;
    }
    updateClock();
    setInterval(updateClock, 1000);

document.addEventListener('DOMContentLoaded', function() {
    var aiBtn = document.getElementById('aiBtn');
    var aiInput = document.getElementById('aiInput');
    
    if (aiBtn && aiInput) {
        aiBtn.addEventListener('click', function() {
            var text = aiInput.value.trim();
            if (!text) {
                layer.msg('请输入您的需求');
                return;
            }
            
            var index = layer.load(2, {shade: 0.1});
            aiBtn.disabled = true;
            aiBtn.textContent = 'AI 思考中...';
            
            var csrfHeaderName = document.querySelector('meta[name="_csrf_header"]').getAttribute('content');
            var csrfTokenValue = document.querySelector('meta[name="_csrf"]').getAttribute('content');
            
            var headers = {
                'Content-Type': 'application/json'
            };
            headers[csrfHeaderName] = csrfTokenValue;
            
            fetch('/api/ai/parse', {
                method: 'POST',
                headers: headers,
                body: JSON.stringify({text: text})
            }).then(response => response.json()).then(data => {
                layer.close(index);
                aiBtn.disabled = false;
                aiBtn.textContent = '一句话预定';
                
                if (data.message && data.message.includes('失败')) {
                    layer.alert(data.message, {icon: 2});
                    return;
                }
                
                if (!data.recommendedRoom) {
                    layer.alert(data.message || '抱歉，没有找到符合您要求的空闲会议室。', {icon: 0});
                    return;
                }
                
                var room = data.recommendedRoom;
                var html = `
                    <div style="padding: 20px; line-height: 1.8;">
                        <h3 style="margin-bottom: 15px; color: #3b82f6;"><i class="layui-icon layui-icon-auz"></i> 智能匹配成功</h3>
                        <p><strong>推荐会议室：</strong>${room.roomName} (容量: ${room.capacity}人)</p>
                        <p><strong>会议主题：</strong>${data.meetingTitle || '未命名会议'}</p>
                        <p><strong>开始时间：</strong>${data.startTime.replace('T', ' ')}</p>
                        <p><strong>结束时间：</strong>${data.endTime.replace('T', ' ')}</p>
                        <p><strong>建议人数：</strong>${data.attendeeCount} 人</p>
                    </div>
                `;
                
                layer.confirm(html, {
                    title: '请确认 AI 预定信息',
                    area: ['400px', 'auto'],
                    btn: ['确认预定', '取消']
                }, function(cIndex) {
                    layer.close(cIndex);
                    
                    var form = document.createElement('form');
                    form.method = 'POST';
                    form.action = '/booking';
                    
                    var csrfInput = document.createElement('input');
                    csrfInput.type = 'hidden';
                    csrfInput.name = '_csrf';
                    csrfInput.value = document.querySelector('meta[name="_csrf"]').getAttribute('content');
                    form.appendChild(csrfInput);
                    
                    var inputs = {
                        roomId: room.id,
                        meetingTitle: data.meetingTitle || '未命名会议',
                        startTime: data.startTime.substring(0, 16).replace('T', ' '),
                        endTime: data.endTime.substring(0, 16).replace('T', ' '),
                        attendeeCount: data.attendeeCount
                    };
                    
                    for (var key in inputs) {
                        var input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = key;
                        input.value = inputs[key];
                        form.appendChild(input);
                    }
                    
                    document.body.appendChild(form);
                    form.submit();
                });
            }).catch(err => {
                layer.close(index);
                aiBtn.disabled = false;
                aiBtn.textContent = '一句话预定';
                layer.alert('请求异常，请检查网络或配置', {icon: 2});
            });
        });
        
        aiInput.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                aiBtn.click();
            }
        });
    }
});
</script>
