<div>
    <style>
        .approval-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
            gap: 24px;
        }

        .approval-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            border: 1px solid #f1f5f9;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .approval-card:hover {
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
            transform: translateY(-4px);
        }

        .approval-card.selected {
            border-color: #6366f1;
            background: #eff6ff;
            box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.2), 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        .approval-card-head {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .approval-card-title {
            font-size: 16px;
            font-weight: 800;
            color: #0f172a;
            flex: 1;
            margin-right: 12px;
            letter-spacing: -0.02em;
        }

        .approval-checkbox {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #6366f1;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .approval-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
        }

        .approval-meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #64748b;
        }

        .approval-meta-item i {
            font-size: 14px;
            color: #94a3b8;
            flex-shrink: 0;
        }

        .approval-meta-item span {
            color: #1e293b;
            font-weight: 500;
        }

        .approval-meta-item .mono-val {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: #0f172a;
            font-size: 12px;
        }

        .approval-actions {
            display: flex;
            gap: 12px;
            border-top: 1px solid #f1f5f9;
            padding-top: 16px;
        }

        /* 纯文本幽灵按钮 */
        .ghost-link {
            flex: 1;
            padding: 8px 12px;
            border: none;
            border-radius: 8px;
            background: transparent;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-decoration: none;
        }

        .ghost-link.approve {
            color: #166534;
        }

        .ghost-link.approve:hover {
            background: #dcfce7;
        }

        .ghost-link.reject {
            color: #dc2626;
        }

        .ghost-link.reject:hover {
            background: #fef2f2;
        }

        /* 批量操作浮动栏 */
        .batch-bar {
            position: fixed;
            bottom: 32px;
            left: 50%;
            transform: translateX(-50%) translateY(100px);
            background: #0f172a;
            color: #ffffff;
            border-radius: 12px;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 24px;
            box-shadow: 0 12px 48px rgba(0, 0, 0, 0.2);
            z-index: 200;
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            white-space: nowrap;
        }

        .batch-bar.show {
            transform: translateX(-50%) translateY(0);
        }

        .batch-bar-count {
            font-size: 15px;
            font-weight: 600;
        }

        .batch-approve-btn {
            padding: 10px 20px;
            background: #ffffff;
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        .batch-approve-btn:hover {
            background: #f1f5f9;
            transform: translateY(-1px);
        }

        .batch-cancel-btn {
            padding: 10px 20px;
            background: rgba(255, 255, 255, 0.1);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .batch-cancel-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .select-all-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 24px;
            font-size: 14px;
            color: #475569;
            font-weight: 600;
            background: #ffffff;
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.02);
        }

        .select-all-wrap input {
            width: 18px;
            height: 18px;
            accent-color: #6366f1;
            cursor: pointer;
        }

        .select-all-wrap label {
            cursor: pointer;
        }

        .empty-approval {
            text-align: center;
            padding: 100px 20px;
            color: #64748b;
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
        }

        .empty-approval i {
            font-size: 56px;
            color: #cbd5e1;
            margin-bottom: 20px;
            display: block;
        }

        /* Morandi Tags */
        .tag {
            font-size: 12px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 6px;
            display: inline-flex;
            align-items: center;
        }

        .tag-yellow {
            background: #fef9c3;
            color: #854d0e;
        }

        .tag-green {
            background: #dcfce7;
            color: #166534;
        }

        /* ==================== 审批中心专属暗黑模式覆盖 ==================== */
        html[data-theme="dark"] .rs-page-title { color: var(--text-1) !important; }
        
        html[data-theme="dark"] .approval-card { background: var(--card); border-color: var(--border); }
        html[data-theme="dark"] .approval-card.selected { background: rgba(99, 102, 241, 0.15); border-color: #818cf8; }
        
        html[data-theme="dark"] .approval-card-title { color: var(--text-1); }
        html[data-theme="dark"] .approval-meta-item { color: var(--text-3); }
        html[data-theme="dark"] .approval-meta-item span { color: var(--text-2); }
        html[data-theme="dark"] .approval-meta-item .mono-val { color: var(--text-1); }
        
        html[data-theme="dark"] .approval-actions { border-top-color: var(--border); }
        
        html[data-theme="dark"] .select-all-wrap { background: var(--card); color: var(--text-2); }
        html[data-theme="dark"] .select-all-wrap span { color: var(--text-3) !important; }
        
        html[data-theme="dark"] .empty-approval { background: var(--card); color: var(--text-3); }
        html[data-theme="dark"] .empty-approval p[style*="color: #0f172a"] { color: var(--text-1) !important; }
        
        /* 莫兰迪标签 */
        html[data-theme="dark"] .tag-yellow { background: rgba(133, 77, 14, 0.3); color: #facc15; }
        html[data-theme="dark"] .tag-green { background: rgba(22, 101, 52, 0.3); color: #4ade80; }
    </style>

    <!-- 页头 -->
    <div class="rs-page-header" style="display: flex; align-items: center; gap: 16px; margin-bottom: 24px;">
        <div class="rs-page-title" style="font-size: 24px; font-weight: 800; color: #0f172a; letter-spacing: -0.02em;">
            审批中心</div>
        <span class="tag tag-yellow" th:if="${not #lists.isEmpty(pendingBookings)}"
            th:text="${#lists.size(pendingBookings)} + ' 项待审批'">待审批</span>
        <span class="tag tag-green" th:if="${#lists.isEmpty(pendingBookings)}">队列已清空</span>
    </div>

    <!-- 全选操作栏 -->
    <div class="select-all-wrap" th:if="${not #lists.isEmpty(pendingBookings)}">
        <input type="checkbox" id="selectAll" onchange="toggleAll(this.checked)">
        <label for="selectAll">全选列表项</label>
        <span style="color: #94a3b8; font-size:13px; font-weight:400; margin-left: 8px;">勾选后可批量审批通过</span>
    </div>

    <!-- 审批卡片网格 -->
    <div class="approval-grid" th:if="${not #lists.isEmpty(pendingBookings)}">
        <div class="approval-card" th:each="b : ${pendingBookings}" th:data-id="${b.id}">
            <div class="approval-card-head">
                <div class="approval-card-title" th:text="${b.meetingTitle}">会议主题</div>
                <input type="checkbox" class="approval-checkbox" th:value="${b.id}" onchange="updateBatchBar()">
            </div>
            <div class="approval-meta">
                <div class="approval-meta-item">
                    <i class="layui-icon layui-icon-username"></i>
                    <span th:text="${b.userName}">申请人</span>
                </div>
                <div class="approval-meta-item">
                    <i class="layui-icon layui-icon-location"></i>
                    <span th:text="${b.roomName}">会议室</span>
                </div>
                <div class="approval-meta-item">
                    <i class="layui-icon layui-icon-time"></i>
                    <span class="mono-val" th:text="${b.startTimeFormatted}">--</span>
                </div>
                <div class="approval-meta-item">
                    <i class="layui-icon layui-icon-group"></i>
                    <span th:text="${b.attendeeCount} + ' 人'">0 人</span>
                </div>
            </div>
            <div th:if="${b.remark != null and !#strings.isEmpty(b.remark)}"
                style="font-size:13px; color:#475569; background:#f8fafc; border-radius:8px; padding:10px 14px; margin-bottom:16px; line-height:1.5; border: 1px solid #f1f5f9;"
                th:text="'备注：' + ${b.remark}"></div>
            <div class="approval-actions">
                <button class="ghost-link approve" th:data-id="${b.id}"
                    onclick="approveOne(this.getAttribute('data-id'))">
                    <i class="layui-icon layui-icon-ok" style="font-size: 14px; margin-right: 4px;"></i> 审批通过
                </button>
                <button class="ghost-link reject" th:data-id="${b.id}"
                    onclick="rejectOne(this.getAttribute('data-id'))">
                    <i class="layui-icon layui-icon-close" style="font-size: 14px; margin-right: 4px;"></i> 拒绝
                </button>
            </div>
        </div>
    </div>

    <!-- 空状态 -->
    <div class="empty-approval" th:if="${#lists.isEmpty(pendingBookings)}">
        <i class="layui-icon layui-icon-survey"></i>
        <p style="font-size:18px; font-weight:800; margin-bottom:8px; color: #0f172a; letter-spacing: -0.02em;">待审批队列为空
        </p>
        <p style="font-size:14px;">所有预约均已处理完毕</p>
    </div>

    <!-- 分页 -->
    <div class="pagination-wrap" th:if="${bookingPage.pages > 1}" style="margin-top: 32px;">
        <div id="approval-pagination"></div>
    </div>

    <!-- 批量操作浮动栏 -->
    <div id="batchBar" class="batch-bar">
        <span class="batch-bar-count"><i class="layui-icon layui-icon-ok-circle" style="margin-right: 6px;"></i> 已选
            <span id="selectedCount" style="font-family: ui-monospace, monospace; padding: 0 4px;">0</span> 项</span>
        <button class="batch-approve-btn" onclick="batchApprove()">批量审批通过</button>
        <button class="batch-cancel-btn" onclick="clearSelection()">取消选中</button>
    </div>

    <script th:inline="javascript">
        // --- 审批操作核心逻辑 ---

        // 1. 单条通过
        window.approveOne = function (id) {
            Swal.fire({
                title: '审批确认',
                text: '确认审批通过此预约？',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: '确定通过',
                cancelButtonText: '取消',
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#64748b'
            }).then(function (result) {
                if (result.isConfirmed) {
                    $.ajax({
                        url: '/api/booking/' + id + '/approve',
                        type: 'PUT',
                        contentType: 'application/json',
                        data: JSON.stringify({ remark: '审批通过' }),
                        success: function (res) {
                            if (res.code === 200) {
                                SystemAlert.success('已通过', function() { location.reload(); });
                            } else {
                                SystemAlert.error(res.message || '操作失败');
                            }
                        }
                    });
                }
            });
        };

        // 2. 单条拒绝
        window.rejectOne = function (id) {
            Swal.fire({
                title: '拒绝预约',
                input: 'textarea',
                inputPlaceholder: '请输入拒绝原因...',
                showCancelButton: true,
                confirmButtonText: '确定拒绝',
                confirmButtonColor: '#ef4444',
                inputValidator: function (value) {
                    if (!value || !value.trim()) return '请输入拒绝原因';
                }
            }).then(function (result) {
                if (result.isConfirmed) {
                    $.ajax({
                        url: '/api/booking/' + id + '/reject',
                        type: 'PUT',
                        contentType: 'application/json',
                        data: JSON.stringify({ remark: result.value.trim() }),
                        success: function (res) {
                            if (res.code === 200) {
                                location.reload();
                            } else {
                                SystemAlert.error(res.message || '拒绝失败');
                            }
                        }
                    });
                }
            });
        };

        // 3. 批量审批
        window.batchApprove = function () {
            var ids = getSelectedIds();
            if (ids.length === 0) return SystemAlert.warning('请先勾选预约');

            Swal.fire({
                title: '批量确认',
                text: '确定批量审批通过 ' + ids.length + ' 条预约？',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: '确定通过',
                confirmButtonColor: '#10b981'
            }).then(function (result) {
                if (result.isConfirmed) {
                    $.ajax({
                        url: '/api/admin/bookings/batch-approve',
                        type: 'PUT',
                        contentType: 'application/json',
                        data: JSON.stringify({ ids: ids }),
                        success: function (res) {
                            if (res.code === 200) {
                                SystemAlert.success('批量审批成功', function() { location.reload(); });
                            } else {
                                SystemAlert.error(res.message || '批量审批失败');
                            }
                        }
                    });
                }
            });
        };

        // --- 辅助 UI 交互函数 ---

        window.toggleAll = function (checked) {
            $('.approval-checkbox').prop('checked', checked);
            $('.approval-card').toggleClass('selected', checked);
            updateBatchBar();
        };

        window.getSelectedIds = function () {
            return $('.approval-checkbox:checked').map(function () { return parseInt($(this).val()); }).get();
        };

        window.updateBatchBar = function () {
            var count = $('.approval-checkbox:checked').length;
            $('#selectedCount').text(count);
            $('#batchBar').toggleClass('show', count > 0);

            // 同步卡片选中状态视觉
            $('.approval-checkbox').each(function () {
                $(this).closest('.approval-card').toggleClass('selected', $(this).is(':checked'));
            });
        };

        window.clearSelection = function () {
            $('#selectAll').prop('checked', false);
            $('.approval-checkbox').prop('checked', false);
            $('.approval-card').removeClass('selected');
            updateBatchBar();
        };
    </script>
</div>
