<div>
    <style>
        /* ===== Dashboard 专属样式 ===== */
        .dash-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 28px;
        }

        .dash-header-left h1 {
            font-size: 24px;
            font-weight: 800;
            color: var(--text-1);
            letter-spacing: -0.5px;
        }

        .dash-header-left p {
            font-size: 13px;
            color: var(--text-3);
            margin-top: 2px;
        }

        .dash-header-right {
            display: flex;
            gap: 10px;
        }

        .stat-cards {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: #ffffff;
            border-radius: 12px;
            padding: 22px 24px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            display: flex;
            align-items: flex-start;
            gap: 16px;
            transition: transform 0.2s, box-shadow 0.2s;
            position: relative;
            overflow: hidden;
            border: none;
        }

        .stat-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.08);
        }

        .stat-card::after {
            content: '';
            position: absolute;
            top: -20px;
            right: -20px;
            width: 80px;
            height: 80px;
            border-radius: 50%;
            opacity: 0.06;
        }

        .stat-card.blue::after {
            background: #2563eb;
        }

        .stat-card.amber::after {
            background: #d97706;
        }

        .stat-card.emerald::after {
            background: #059669;
        }

        .stat-card.violet::after {
            background: #7c3aed;
        }

        .stat-icon {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .stat-icon i {
            font-size: 24px;
        }

        .stat-icon.blue {
            background: #eff6ff;
            color: #2563eb;
        }

        .stat-icon.amber {
            background: #fffbeb;
            color: #d97706;
        }

        .stat-icon.emerald {
            background: #ecfdf5;
            color: #059669;
        }

        .stat-icon.violet {
            background: #f5f3ff;
            color: #7c3aed;
        }

        .stat-body {
            flex: 1;
            min-width: 0;
        }

        .stat-value {
            font-size: 28px;
            font-weight: 800;
            color: #0f172a;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            letter-spacing: -1px;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 13px;
            color: #64748b;
            margin-top: 4px;
        }

        .dash-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .dash-panel {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
            overflow: hidden;
            border: none;
        }

        .panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 18px 22px 0;
        }

        .panel-title {
            font-size: 15px;
            font-weight: 700;
            color: #0f172a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .panel-title i {
            font-size: 18px;
            color: #0f172a;
        }

        .panel-badge {
            font-size: 12px;
            font-weight: 600;
            padding: 2px 10px;
            border-radius: 20px;
            background: #f1f5f9;
            color: #0f172a;
        }

        .panel-body {
            padding: 16px 22px 20px;
        }

        .rank-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .rank-item {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .rank-num {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: #f1f5f9;
            font-size: 11px;
            font-weight: 700;
            color: #475569;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .rank-num.gold {
            background: #fef3c7;
            color: #92400e;
        }

        .rank-num.silver {
            background: #e2e8f0;
            color: #334155;
        }

        .rank-num.bronze {
            background: #ffedd5;
            color: #9a3412;
        }

        .rank-name {
            font-size: 13px;
            color: #334155;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-weight: 500;
        }

        .rank-bar-wrap {
            width: 100px;
            height: 6px;
            background: #f1f5f9;
            border-radius: 3px;
            overflow: hidden;
            flex-shrink: 0;
        }

        .rank-bar {
            height: 100%;
            background: #0f172a;
            border-radius: 3px;
            min-width: 4px;
        }

        .rank-count {
            font-size: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: #64748b;
            flex-shrink: 0;
            min-width: 36px;
            text-align: right;
        }

        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .schedule-item {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 10px 14px;
            background: #ffffff;
            border-radius: 8px;
            transition: background 0.15s;
        }

        .schedule-item:hover {
            background: #f8fafc;
        }

        .schedule-time {
            font-size: 12px;
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
            color: #64748b;
            white-space: nowrap;
            min-width: 80px;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .schedule-title {
            font-weight: 600;
            font-size: 13px;
            color: #0f172a;
            flex: 1;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .schedule-room {
            font-size: 12px;
            color: #475569;
            background: #f1f5f9;
            padding: 4px 8px;
            border-radius: 6px;
            white-space: nowrap;
        }

        .pending-list {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .pending-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            background: #ffffff;
            border-radius: 8px;
            border-left: 3px solid #0f172a;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.02);
        }

        .pending-info {
            flex: 1;
            min-width: 0;
        }

        .pending-title {
            font-size: 13px;
            font-weight: 600;
            color: #0f172a;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .pending-meta {
            font-size: 12px;
            color: #64748b;
            margin-top: 4px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .pending-meta .dot {
            width: 3px;
            height: 3px;
            border-radius: 50%;
            background: #cbd5e1;
        }

        .pending-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        /* 纯文本幽灵按钮 */
        .ghost-link {
            font-size: 13px;
            font-weight: 600;
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            border: none;
            background: transparent;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .ghost-link.approve {
            color: #166534;
        }

        .ghost-link.approve:hover {
            background: #dcfce7;
        }

        .ghost-link.reject {
            color: #dc2626;
        }

        .ghost-link.reject:hover {
            background: #fef2f2;
        }

        .ghost-link.primary {
            color: #0f172a;
        }

        .ghost-link.primary:hover {
            background: #f1f5f9;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #94a3b8;
        }

        .empty-state i {
            font-size: 40px;
            color: #cbd5e1;
            margin-bottom: 10px;
            display: block;
        }

        .empty-state p {
            font-size: 13px;
        }

        @media (max-width: 1100px) {
            .stat-cards {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .stat-cards {
                grid-template-columns: 1fr;
            }

            .dash-row {
                grid-template-columns: 1fr;
            }
        }

        /* ==================== 控制台专属暗黑模式覆盖 ==================== */
        html[data-theme="dark"] .dash-header-left h1 { color: var(--text-1); }
        html[data-theme="dark"] .dash-header-left p { color: var(--text-3); }
        html[data-theme="dark"] .ghost-link.primary { color: var(--text-1); background: var(--border) !important; }
        html[data-theme="dark"] .ghost-link.primary:hover { background: var(--border-light) !important; }

        html[data-theme="dark"] .stat-card { background: var(--card); }
        html[data-theme="dark"] .stat-value { color: var(--text-1); }
        html[data-theme="dark"] .stat-label { color: var(--text-3); }

        /* 图标暗黑化 */
        html[data-theme="dark"] .stat-icon.blue { background: rgba(37, 99, 235, 0.2); color: #60a5fa; }
        html[data-theme="dark"] .stat-icon.amber { background: rgba(217, 119, 6, 0.2); color: #fbbf24; }
        html[data-theme="dark"] .stat-icon.emerald { background: rgba(5, 150, 105, 0.2); color: #34d399; }
        html[data-theme="dark"] .stat-icon.violet { background: rgba(124, 58, 237, 0.2); color: #a78bfa; }

        html[data-theme="dark"] .dash-panel { background: var(--card); }
        html[data-theme="dark"] .panel-title { color: var(--text-1); }
        html[data-theme="dark"] .panel-title i { color: var(--text-1); }
        html[data-theme="dark"] .panel-badge { background: var(--bg); color: var(--text-3); }
        
        html[data-theme="dark"] .rank-num { background: var(--bg); color: var(--text-3); }
        html[data-theme="dark"] .rank-num.gold { background: rgba(146, 64, 14, 0.3); color: #fbbf24; }
        html[data-theme="dark"] .rank-num.silver { background: rgba(51, 65, 85, 0.3); color: #cbd5e1; }
        html[data-theme="dark"] .rank-num.bronze { background: rgba(154, 52, 18, 0.3); color: #fdba74; }
        html[data-theme="dark"] .rank-name { color: var(--text-2); }
        html[data-theme="dark"] .rank-bar-wrap { background: var(--bg); }
        html[data-theme="dark"] .rank-bar { background: var(--text-1); }
        html[data-theme="dark"] .rank-count { color: var(--text-3); }

        html[data-theme="dark"] .schedule-item { background: var(--card); }
        html[data-theme="dark"] .schedule-item:hover { background: var(--bg); }
        html[data-theme="dark"] .schedule-title { color: var(--text-1); }
        html[data-theme="dark"] .schedule-time { color: var(--text-3); }
        html[data-theme="dark"] .schedule-room { background: var(--bg); color: var(--text-3); }
        
        html[data-theme="dark"] .pending-item { background: var(--card); border-left-color: var(--text-1); }
        html[data-theme="dark"] .pending-title { color: var(--text-1); }
        html[data-theme="dark"] .pending-meta { color: var(--text-3); }
        html[data-theme="dark"] .pending-meta .dot { background: var(--text-3); }
        
        html[data-theme="dark"] .empty-state p { color: var(--text-3); }
    </style>

    <!-- 页面标题 -->
    <div class="dash-header">
        <div class="dash-header-left">
            <h1>控制台</h1>
            <p>欢迎回来，<span sec:authentication="name">管理员</span>，以下是今日概览</p>
        </div>
        <div class="dash-header-right">
            <a th:href="@{/admin/approvals}" class="ghost-link primary" style="background: #f1f5f9;">
                <i class="layui-icon layui-icon-list" style="margin-right: 4px;"></i> 审批中心
            </a>
        </div>
    </div>

    <!-- KPI 统计卡片 -->
    <div class="stat-cards">
        <div class="stat-card blue">
            <div class="stat-icon blue">
                <i class="layui-icon layui-icon-form"></i>
            </div>
            <div class="stat-body">
                <div class="stat-value" th:text="${dashboard.todayBookingCount}">0</div>
                <div class="stat-label">今日预约</div>
            </div>
        </div>
        <div class="stat-card amber">
            <div class="stat-icon amber">
                <i class="layui-icon layui-icon-time"></i>
            </div>
            <div class="stat-body">
                <div class="stat-value" th:text="${dashboard.pendingApprovalCount}">0</div>
                <div class="stat-label">待审批</div>
            </div>
        </div>
        <div class="stat-card emerald">
            <div class="stat-icon emerald">
                <i class="layui-icon layui-icon-template"></i>
            </div>
            <div class="stat-body">
                <div class="stat-value" th:text="${dashboard.totalRoomCount}">0</div>
                <div class="stat-label">可用会议室</div>
            </div>
        </div>
        <div class="stat-card violet">
            <div class="stat-icon violet">
                <i class="layui-icon layui-icon-chart"></i>
            </div>
            <div class="stat-body">
                <div class="stat-value"
                    th:text="${#numbers.formatDecimal(dashboard.weeklyUtilizationRate, 1, 1) + '%'}">0.0%</div>
                <div class="stat-label">本周利用率</div>
            </div>
        </div>
    </div>

    <!-- 双栏：排行榜 -->
    <div class="dash-row">
        <!-- 会议室使用排行 -->
        <div class="dash-panel">
            <div class="panel-header">
                <div class="panel-title">
                    <i class="layui-icon layui-icon-component"></i> 本月会议室使用 TOP5
                </div>
            </div>
            <div class="panel-body">
                <div class="rank-list" th:if="${not #lists.isEmpty(dashboard.topUsedRooms)}">
                    <div class="rank-item" th:each="room, stat : ${dashboard.topUsedRooms}">
                        <div th:class="'rank-num' + (${stat.index} == 0 ? ' gold' : (${stat.index} == 1 ? ' silver' : (${stat.index} == 2 ? ' bronze' : '')))"
                            th:text="${stat.count}">1</div>
                        <div class="rank-name" th:text="${room['roomName']}">--</div>
                        <div class="rank-bar-wrap">
                            <div class="rank-bar"
                                th:style="'width:' + (${room['count'] != null ? room['count'] * 10 : 0}) + 'px; max-width:100px;'">
                            </div>
                        </div>
                        <div class="rank-count" th:text="(${room['count'] != null ? room['count'] : 0}) + ' 次'">0 次
                        </div>
                    </div>
                </div>
                <div class="empty-state" th:if="${#lists.isEmpty(dashboard.topUsedRooms)}">
                    <i class="layui-icon layui-icon-search"></i>
                    <p>本月暂无使用记录</p>
                </div>
            </div>
        </div>

        <!-- 用户预约排行 -->
        <div class="dash-panel">
            <div class="panel-header">
                <div class="panel-title">
                    <i class="layui-icon layui-icon-user"></i> 本月活跃用户 TOP5
                </div>
            </div>
            <div class="panel-body">
                <div class="rank-list" th:if="${not #lists.isEmpty(dashboard.monthlyTopUsers)}">
                    <div class="rank-item" th:each="user, stat : ${dashboard.monthlyTopUsers}">
                        <div th:class="'rank-num' + (${stat.index} == 0 ? ' gold' : (${stat.index} == 1 ? ' silver' : (${stat.index} == 2 ? ' bronze' : '')))"
                            th:text="${stat.count}">1</div>
                        <div class="rank-name" th:text="${user['username']}">--</div>
                        <div class="rank-bar-wrap">
                            <div class="rank-bar"
                                th:style="'width:' + (${user['count'] != null ? user['count'] * 10 : 0}) + 'px; max-width:100px;'">
                            </div>
                        </div>
                        <div class="rank-count" th:text="(${user['count'] != null ? user['count'] : 0}) + ' 次'">0 次
                        </div>
                    </div>
                </div>
                <div class="empty-state" th:if="${#lists.isEmpty(dashboard.monthlyTopUsers)}">
                    <i class="layui-icon layui-icon-search"></i>
                    <p>本月暂无预约记录</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 双栏：今日安排 + 待审批 -->
    <div class="dash-row">
        <!-- 今日会议安排 -->
        <div class="dash-panel">
            <div class="panel-header">
                <div class="panel-title">
                    <i class="layui-icon layui-icon-log"></i> 今日会议安排
                </div>
                <span class="panel-badge" th:text="${#lists.size(dashboard.todayBookings)} + ' 场'">0 场</span>
            </div>
            <div class="panel-body">
                <div class="schedule-list" th:if="${not #lists.isEmpty(dashboard.todayBookings)}">
                    <div class="schedule-item" th:each="b : ${dashboard.todayBookings}">
                        <div class="schedule-time">
                            <i class="layui-icon layui-icon-time" style="font-size: 12px;"></i>
                            <span
                                th:text="${#temporals.format(b['startTime'], 'HH:mm')} + ' - ' + ${#temporals.format(b['endTime'], 'HH:mm')}">--:--</span>
                        </div>
                        <div class="schedule-title" th:text="${b['title']}">会议主题</div>
                        <div class="schedule-room" th:text="${b['roomName']}">会议室</div>
                    </div>
                </div>
                <div class="empty-state" th:if="${#lists.isEmpty(dashboard.todayBookings)}">
                    <i class="layui-icon layui-icon-date"></i>
                    <p>今日暂无会议安排</p>
                </div>
            </div>
        </div>

        <!-- 待审批预约 -->
        <div class="dash-panel">
            <div class="panel-header">
                <div class="panel-title">
                    <i class="layui-icon layui-icon-survey"></i> 待审批预约
                </div>
                <span class="panel-badge" th:text="${#lists.size(dashboard.pendingBookings)} + ' 项'">0 项</span>
            </div>
            <div class="panel-body">
                <div class="pending-list" th:if="${not #lists.isEmpty(dashboard.pendingBookings)}">
                    <div class="pending-item" th:each="b : ${dashboard.pendingBookings}">
                        <div class="pending-info">
                            <div class="pending-title" th:text="${b.meetingTitle}">会议主题</div>
                            <div class="pending-meta">
                                <span th:text="${b.userName}">--</span>
                                <span class="dot"></span>
                                <span th:text="${b.roomName}">--</span>
                            </div>
                        </div>
                        <div class="pending-actions">
                            <button class="ghost-link approve" th:data-id="${b.id}"
                                onclick="approveOne(this.getAttribute('data-id'))">通过</button>
                            <button class="ghost-link reject" th:data-id="${b.id}"
                                onclick="rejectOne(this.getAttribute('data-id'))">拒绝</button>
                        </div>
                    </div>
                </div>
                <div class="empty-state" th:if="${#lists.isEmpty(dashboard.pendingBookings)}">
                    <i class="layui-icon layui-icon-ok-circle"></i>
                    <p>暂无待审批预约</p>
                </div>
                <div style="margin-top:12px; text-align:right;" th:if="${dashboard.pendingApprovalCount > 0}">
                    <a th:href="@{/admin/approvals}" class="ghost-link primary">查看全部待审批 &rarr;</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.approveOne = function (id) {
            Swal.fire({
                title: '审批确认',
                text: '确认审批通过此预约？',
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: '确定通过',
                cancelButtonText: '取消',
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#64748b'
            }).then(function (result) {
                if (result.isConfirmed) {
                    $.ajax({
                        url: '/api/booking/' + id + '/approve',
                        type: 'PUT',
                        contentType: 'application/json',
                        data: JSON.stringify({ remark: '审批通过' }),
                        success: function (res) {
                            if (res.code === 200) {
                                SystemAlert.success('已通过', function () { location.reload(); });
                            } else {
                                SystemAlert.error(res.message || '操作失败');
                            }
                        },
                        error: function () { SystemAlert.error('网络错误，请重试'); }
                    });
                }
            });
        };

        window.rejectOne = function (id) {
            Swal.fire({
                title: '拒绝预约',
                input: 'textarea',
                inputPlaceholder: '请输入拒绝原因...',
                inputAttributes: { 'aria-label': '拒绝原因' },
                showCancelButton: true,
                confirmButtonText: '确定拒绝',
                cancelButtonText: '取消',
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#64748b',
                inputValidator: function (value) {
                    if (!value || !value.trim()) return '请输入拒绝原因';
                }
            }).then(function (result) {
                if (result.isConfirmed) {
                    $.ajax({
                        url: '/api/booking/' + id + '/reject',
                        type: 'PUT',
                        contentType: 'application/json',
                        data: JSON.stringify({ remark: result.value.trim() }),
                        success: function (res) {
                            if (res.code === 200) {
                                SystemAlert.success('已拒绝', function () { location.reload(); });
                            } else {
                                SystemAlert.error(res.message || '操作失败');
                            }
                        },
                        error: function () { SystemAlert.error('网络错误，请重试'); }
                    });
                }
            });
        };
    </script>
</div>
