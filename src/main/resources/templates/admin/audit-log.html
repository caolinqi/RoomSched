<div class="rs-page-header" style="margin-bottom: 24px;">
    <div class="rs-page-title" style="font-size: 24px; font-weight: 800; color: #0f172a; letter-spacing: -0.02em;">操作日志</div>
</div>
<style>
    /* ==================== 审计日志专属暗黑模式覆盖 ==================== */
    html[data-theme="dark"] .rs-page-title { color: var(--text-1) !important; }
    html[data-theme="dark"] .layui-card { background: var(--card); border: none; box-shadow: none; }
</style>
<div class="layui-card">
    <div class="layui-card-body">
        <table id="auditTable" lay-filter="auditTable"></table>
    </div>
</div>

<script th:src="@{/layui/layui.js}"></script>
<script>
    layui.use(['table', 'util'], function(){
        var table = layui.table;
        var util = layui.util;

        table.render({
            elem: '#auditTable',
            url: '/admin/audit/list',
            page: true,
            limit: 15,
            limits: [15, 30, 50],
            parseData: function(res) {
                // 适配 Spring Boot Result + MyBatis Plus Page
                return {
                    "code": res.code === 200 ? 0 : res.code,
                    "msg": res.message,
                    "count": res.data.total,
                    "data": res.data.records
                };
            },
            cols: [ [
                {field: 'id', title: 'ID', width: 80, sort: true},
                {field: 'username', title: '操作人', width: 120, templet: function(d){
                    return d.username === 'SYSTEM/ANONYMOUS' ? '<span style="color:#999">未登录/系统</span>' : '<span style="color:#1e90ff;font-weight:bold;">'+d.username+'</span>';
                }},
                {field: 'action', title: '动作类型', width: 150, templet: function(d){
                    return d.action;
                }},
                {field: 'ipAddress', title: 'IP 地址', width: 140},
                {field: 'details', title: '方法参数详情', minWidth: 300, className: 'details-col'},
                {field: 'createTime', title: '操作时间', width: 170, sort: true, templet: function(d){
                    return util.toDateString(d.createTime, 'yyyy-MM-dd HH:mm:ss');
                }}
            ] ]
        });
    });
</script>

</body>
</html>
