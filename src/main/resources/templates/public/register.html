<!DOCTYPE html>
<html lang="zh-CN" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>注册 - RoomSched</title>
    <link rel="stylesheet" th:href="@{/layui/css/layui.css}">
    <link rel="stylesheet" th:href="@{/css/custom.css}">
    <style>
        :root {
            --bg-color: #f1f5f9;
            --card-bg: #ffffff;
            --primary: #0f172a;
            --accent: #6366f1;
            --text-main: #334155;
            --text-sub: #64748b;
            --border-color: #cbd5e1;
            --radius-md: 12px;
        }

        body,
        html {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: var(--bg-color);
            overflow: hidden;
        }

        .rp-wrapper {
            display: flex;
            height: 100vh;
            width: 100vw;
        }

        /* 左侧深色高质感品牌宣传区 */
        .rp-cover {
            flex: 1;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            position: relative;
            overflow: hidden;
        }

        .rp-cover::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: -100px;
            left: -100px;
            border-radius: 50%;
            pointer-events: none;
        }

        .rp-brand {
            position: absolute;
            top: 40px;
            left: 60px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: #ffffff;
            font-size: 24px;
            font-weight: 800;
            letter-spacing: -0.5px;
            text-decoration: none;
            z-index: 10;
        }

        .rp-brand i {
            color: #6366f1;
            font-size: 28px;
        }

        .rp-slogan {
            max-width: 500px;
            position: relative;
            z-index: 1;
            margin-bottom: 40px;
        }

        .rp-slogan h1 {
            font-size: 42px;
            font-weight: 800;
            color: #ffffff;
            line-height: 1.3;
            margin-bottom: 16px;
        }

        .rp-slogan h1 span {
            color: #818cf8;
        }

        .rp-slogan p {
            font-size: 16px;
            color: #94a3b8;
            line-height: 1.6;
        }

        /* 介绍卡片 */
        .rp-cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
            z-index: 1;
            max-width: 500px;
        }

        .rp-info-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: var(--radius-md);
            display: flex;
            align-items: flex-start;
            gap: 16px;
            transition: transform 0.3s;
        }

        .rp-info-card:hover {
            transform: translateX(8px);
            background: rgba(255, 255, 255, 0.06);
        }

        .rp-info-icon {
            width: 44px;
            height: 44px;
            border-radius: 10px;
            background: rgba(99, 102, 241, 0.2);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .rp-info-icon i {
            font-size: 24px;
            color: #818cf8;
        }

        .rp-info-text h3 {
            margin: 0 0 4px 0;
            color: #f1f5f9;
            font-size: 16px;
            font-weight: 600;
        }

        .rp-info-text p {
            margin: 0;
            color: #94a3b8;
            font-size: 14px;
            line-height: 1.5;
        }

        /* 右侧纯白极简表单区 */
        .rp-panel {
            width: 480px;
            background: var(--card-bg);
            box-shadow: -10px 0 30px rgba(0, 0, 0, 0.03);
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 40px;
            z-index: 2;
            overflow-y: auto;
        }

        .rp-panel-inner {
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
        }

        .rp-head {
            margin-bottom: 32px;
        }

        .rp-head h2 {
            font-size: 28px;
            font-weight: 800;
            color: var(--primary);
            margin: 0 0 8px 0;
        }

        .rp-head p {
            font-size: 14px;
            color: var(--text-sub);
            margin: 0;
        }

        .rp-alert-error {
            background: #fef2f2;
            border: 1px solid #fecaca;
            color: #dc2626;
            padding: 12px 16px;
            border-radius: var(--radius-md);
            font-size: 14px;
            display: flex;
            align-items: flex-start;
            gap: 8px;
            margin-bottom: 24px;
            font-weight: 500;
        }

        .rp-field {
            margin-bottom: 24px;
        }

        .rp-field label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        .rp-input-wrap {
            position: relative;
        }

        .rp-input-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            pointer-events: none;
        }

        .rp-input-icon i {
            font-size: 18px;
        }

        /* 48px 高输入框，柔和主题色发光 */
        .rp-input {
            width: 100%;
            height: 48px;
            padding: 0 16px 0 44px;
            border: 1px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 15px;
            color: var(--primary);
            background: #fff;
            outline: none;
            transition: all 0.2s ease;
            box-sizing: border-box;
        }

        .rp-input::placeholder {
            color: #94a3b8;
        }

        .rp-input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
        }

        /* 提交按钮：去块化，柔和阴影 */
        .rp-btn {
            width: 100%;
            height: 48px;
            background: var(--accent);
            color: #fff;
            border: none;
            border-radius: var(--radius-md);
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            box-shadow: 0 4px 16px rgba(99, 102, 241, 0.25);
        }

        .rp-btn:hover {
            background: #4f46e5;
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(99, 102, 241, 0.3);
        }

        .rp-link {
            text-align: center;
            margin-top: 24px;
            font-size: 14px;
            color: var(--text-sub);
        }

        .rp-link a {
            color: var(--accent);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .rp-link a:hover {
            color: #4f46e5;
            text-decoration: underline;
        }

        @media (max-width: 900px) {
            .rp-cover {
                display: none;
            }

            .rp-panel {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="rp-wrapper">
        <!-- 左侧深色品牌区 -->
        <div class="rp-cover">
            <a href="/" class="rp-brand"><svg
                    style="width:28px;height:28px;stroke:#6366f1;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"
                    viewBox="0 0 24 24">
                    <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
                    <polyline points="9 22 9 12 15 12 15 22" />
                </svg> RoomSched</a>
            <div class="rp-slogan">
                <h1>极简智能<br><span>协同办公新体验</span></h1>
                <p>只需简单的注册步骤，即可开通您的个人办公档案，彻底告别撞会烦恼，随时随地掌握团队的会议动向。</p>
            </div>

            <div class="rp-cards">
                <div class="rp-info-card">
                    <div class="rp-info-icon"><svg
                            style="width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"
                            viewBox="0 0 24 24">
                            <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                            <polyline points="14 2 14 8 20 8" />
                            <line x1="16" y1="13" x2="8" y2="13" />
                            <line x1="16" y1="17" x2="8" y2="17" />
                            <polyline points="10 9 9 9 8 9" />
                        </svg></div>
                    <div class="rp-info-text">
                        <h3>极简注册，一步到位</h3>
                        <p>没有冗长繁琐的字段，设定用户名与密码即可立刻加入企业空间。</p>
                    </div>
                </div>
                <div class="rp-info-card">
                    <div class="rp-info-icon"><svg
                            style="width:24px;height:24px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"
                            viewBox="0 0 24 24">
                            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                        </svg></div>
                    <div class="rp-info-text">
                        <h3>金融级安全加密</h3>
                        <p>采用领先的加密策略保护您的账号与会议隐私，数据安全无忧。</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 右侧极简表单区 -->
        <div class="rp-panel">
            <div class="rp-panel-inner">
                <div class="rp-head">
                    <h2>创建新账号</h2>
                    <p>欢迎加入，请填写以下注册信息</p>
                </div>

                <!-- 错误提示（Morandi Tags 风格） -->
                <div th:if="${error}" class="rp-alert-error">
                    <svg style="width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:2;margin-top:2px;"
                        viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="10" />
                        <line x1="15" y1="9" x2="9" y2="15" />
                        <line x1="9" y1="9" x2="15" y2="15" />
                    </svg>
                    <span th:text="${error}">注册失败</span>
                </div>

                <form th:action="@{/register}" method="post">
                    <!-- 用户名（使用 layui-icon-username） -->
                    <div class="rp-field">
                        <label>用户名</label>
                        <div class="rp-input-wrap">
                            <span class="rp-input-icon"><svg
                                    style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"
                                    viewBox="0 0 24 24">
                                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                                    <circle cx="12" cy="7" r="4" />
                                </svg></span>
                            <input type="text" name="username" class="rp-input" placeholder="设定登录用用户名"
                                th:value="${registerForm?.username}" required autofocus>
                        </div>
                    </div>

                    <!-- 真实姓名（使用 layui-icon-flag） -->
                    <div class="rp-field">
                        <label>真实姓名</label>
                        <div class="rp-input-wrap">
                            <span class="rp-input-icon"><svg
                                    style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"
                                    viewBox="0 0 24 24">
                                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2" />
                                    <line x1="12" y1="8" x2="12" y2="8.01" />
                                    <path d="M12 12a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" />
                                </svg></span>
                            <input type="text" name="realName" class="rp-input" placeholder="请输入您的真实姓名"
                                th:value="${registerForm?.realName}" required>
                        </div>
                    </div>

                    <!-- 密码（使用 layui-icon-password） -->
                    <div class="rp-field">
                        <label>密码</label>
                        <div class="rp-input-wrap">
                            <span class="rp-input-icon"><svg
                                    style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"
                                    viewBox="0 0 24 24">
                                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
                                    <path d="M7 11V7a5 5 0 0 1 10 0v4" />
                                </svg></span>
                            <input type="password" name="password" class="rp-input" placeholder="密码长度至少6位" required>
                        </div>
                    </div>

                    <!-- 确认密码（使用 layui-icon-auz） -->
                    <div class="rp-field">
                        <label>确认密码</label>
                        <div class="rp-input-wrap">
                            <span class="rp-input-icon"><svg
                                    style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"
                                    viewBox="0 0 24 24">
                                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z" />
                                </svg></span>
                            <input type="password" name="confirmPassword" class="rp-input" placeholder="请再次输入密码"
                                required>
                        </div>
                    </div>

                    <button type="submit" class="rp-btn">
                        立即注册
                        <svg style="width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round;"
                            viewBox="0 0 24 24">
                            <line x1="5" y1="12" x2="19" y2="12" />
                            <polyline points="12 5 19 12 12 19" />
                        </svg>
                    </button>
                </form>

                <div class="rp-link">
                    已有账号？ <a th:href="@{/login}">返回登录</a>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
