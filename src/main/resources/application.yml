server:
  port: ${SERVER_PORT:8080}
  servlet:
    session:
      persistent: false
    encoding:
      charset: UTF-8
      enabled: true
      force: true

spring:
  application:
    name: RoomSched
  profiles:
    active: dev
  messages:
    basename: i18n/messages
    encoding: UTF-8

  thymeleaf:
    cache: false
    prefix: classpath:/templates/
    suffix: .html
    mode: HTML
    encoding: UTF-8

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: ${ROOMSCHED_DB_URL:jdbc:mysql://localhost:3306/room_sched?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${ROOMSCHED_DB_USERNAME:root}
    # 生产环境请通过环境变量 ROOMSCHED_DB_PASSWORD 注入，不要在此处硬编码
    password: ${ROOMSCHED_DB_PASSWORD:8138}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 100MB

  # Flyway：数据库版本管理（数据库已手动建好，暂时禁用）
  flyway:
    enabled: false

  # ==================== SMTP 邮件发送配置 ====================
  # 以下配置为占位符，请您在此填入真实的邮箱信息和 SMTP 授权码
  mail:
    host: smtp.qq.com       # 例如：smtp.qq.com (QQ邮箱), smtp.163.com (网易邮箱)
    port: 465               # SSL 通常为 465
    username: #填写你的邮箱地址，例如：xxxxxxxx@qq.com
    password: #填写你的邮箱授权码，例如：xxxxxxxx
    default-encoding: UTF-8
    protocol: smtps
    properties:
      mail.smtp.auth: "true"
      mail.smtp.ssl.enable: "true"
      mail.smtp.connectiontimeout: 5000
      mail.smtp.timeout: 5000
      mail.smtp.writetimeout: 5000
      mail.smtps.connectiontimeout: 5000
      mail.smtps.timeout: 5000
      mail.smtps.writetimeout: 5000

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    # 枚举处理器：使用 name() 字符串存取，与数据库 VARCHAR 字段完全兼容
    default-enum-type-handler: org.apache.ibatis.type.EnumTypeHandler
  global-config:
    db-config:
      id-type: auto
  mapper-locations: classpath:/mapper/**/*.xml

logging:
  level:
    org.example.roomsched: info
    org.springframework.security: warn
    # 生产环境关闭 SQL 日志，开发环境在 application-dev.yml 中开启
    com.baomidou.mybatisplus: warn

# ===============================
# 智能 AI 助手配置 (OpenAI 兼容接口)
# ===============================
ai:
  base-url: "https://api.openai.com/v1"  # OpenAI API 基础 URL
  api-key: ""  # 请通过环境变量 AI_API_KEY 注入，不要在此处硬编码
  model: "gpt-3.5-turbo"